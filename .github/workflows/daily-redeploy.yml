name: Daily Vercel Redeploy

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  redeploy:
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Redeploy
        run: curl --fail --silent --show-error -X POST "$VERCEL_DEPLOY"
        env:
          VERCEL_DEPLOY: ${{ secrets.VERCEL_DEPLOY }}
